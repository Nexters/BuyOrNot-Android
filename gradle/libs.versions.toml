[versions]
agp = "8.13.2"
kotlin = "2.3.0"
ksp = "2.3.4"
androidTools = "32.0.0"
coreKtx = "1.17.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.12.2"
composeBom = "2026.01.00"

# Hilt
hilt = "2.58"
hiltNavigationCompose = "1.3.0"

# DB
datastore = "1.2.0"

# Network
retrofit = "3.0.0"
okhttp = "5.3.2"
kotlinxSerializationJson = "1.9.0"

# Coroutines
coroutines = "1.10.2"

# Lifecycle
lifecycleViewModel = "2.10.0"
core = "1.17.0"

# Image Loading
coil = "2.7.0"

navigationCompose = "2.8.2"
